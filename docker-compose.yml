version: '3.8'

services:
  web:
    build: .
    ports:
      - "5000:5000"
    environment:
      - FLASK_APP=app.py
      - FLASK_ENV=development
      - PYTHONUNBUFFERED=1
    volumes:
      - .:/app
    networks:
      - agritech-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # Optional: Add PostgreSQL for production
  # db:
  #   image: postgres:14-alpine
  #   environment:
  #     - POSTGRES_DB=agritech
  #     - POSTGRES_USER=agritech
  #     - POSTGRES_PASSWORD=secure_password
  #   volumes:
  #     - postgres_data:/var/lib/postgresql/data
  #   networks:
  #     - agritech-network

  # Optional: Add Redis for caching
  # cache:
  #   image: redis:7-alpine
  #   networks:
  #     - agritech-network

networks:
  agritech-network:
    driver: bridge

